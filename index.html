<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather Pro - Professional Weather App</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="app-container">
        <!-- Header -->
        <header class="header">
            <div class="logo">
                <i class="fas fa-cloud-sun"></i>
                <h1>Weather Pro</h1>
            </div>
            <button class="theme-toggle" id="themeToggle">
                <i class="fas fa-moon"></i>
            </button>
        </header>

        <!-- Search Section -->
        <div class="search-container">
            <div class="search-box">
                <input 
                    type="text" 
                    id="cityInput" 
                    placeholder="Search for a city..." 
                    autocomplete="off"
                >
                <button id="searchBtn">
                    <i class="fas fa-search"></i>
                </button>
            </div>
            <button class="location-btn" id="locationBtn">
                <i class="fas fa-location-arrow"></i>
                Use My Location
            </button>
        </div>

        <!-- Loading Spinner -->
        <div class="loading" id="loading">
            <div class="spinner"></div>
            <p>Loading weather data...</p>
        </div>

        <!-- Error Message -->
        <div class="error-message" id="errorMessage">
            <i class="fas fa-exclamation-triangle"></i>
            <span id="errorText"></span>
        </div>

        <!-- Weather Content -->
        <main class="weather-content" id="weatherContent" style="display: none;">
            <!-- Current Weather -->
            <section class="current-weather">
                <div class="city-info">
                    <h2 id="cityName">--</h2>
                    <p id="countryName">--</p>
                </div>
                
                <div class="weather-main">
                    <img id="weatherIcon" src="" alt="Weather Icon" class="weather-icon-large">
                    <div class="temperature">
                        <h3 id="temperature">--°C</h3>
                        <p id="weatherDesc">--</p>
                        <p class="feels-like">Feels like <span id="feelsLike">--</span>°C</p>
                    </div>
                </div>

                <div class="temp-range">
                    <div class="temp-item">
                        <i class="fas fa-arrow-up"></i>
                        <span>High: <strong id="tempMax">--</strong>°C</span>
                    </div>
                    <div class="temp-item">
                        <i class="fas fa-arrow-down"></i>
                        <span>Low: <strong id="tempMin">--</strong>°C</span>
                    </div>
                </div>

                <div class="weather-details">
                    <div class="detail-card">
                        <i class="fas fa-tint"></i>
                        <span class="label">Humidity</span>
                        <span class="value" id="humidity">--%</span>
                    </div>
                    <div class="detail-card">
                        <i class="fas fa-wind"></i>
                        <span class="label">Wind</span>
                        <span class="value" id="windSpeed">-- m/s</span>
                    </div>
                    <div class="detail-card">
                        <i class="fas fa-compress-arrows-alt"></i>
                        <span class="label">Pressure</span>
                        <span class="value" id="pressure">-- hPa</span>
                    </div>
                    <div class="detail-card">
                        <i class="fas fa-cloud"></i>
                        <span class="label">Clouds</span>
                        <span class="value" id="clouds">--%</span>
                    </div>
                </div>

                <div class="sun-times">
                    <div class="sun-item">
                        <i class="fas fa-sun-rise"></i>
                        <span>Sunrise</span>
                        <strong id="sunrise">--:--</strong>
                    </div>
                    <div class="sun-item">
                        <i class="fas fa-sun-set"></i>
                        <span>Sunset</span>
                        <strong id="sunset">--:--</strong>
                    </div>
                </div>
            </section>

            <!-- Hourly Forecast -->
            <section class="forecast-section">
                <h3><i class="fas fa-clock"></i> Hourly Forecast</h3>
                <div class="hourly-forecast" id="hourlyForecast">
                    <!-- Hourly items will be added here -->
                </div>
            </section>

            <!-- 7-Day Forecast -->
            <section class="forecast-section">
                <h3><i class="fas fa-calendar-alt"></i> 7-Day Forecast</h3>
                <div class="daily-forecast" id="dailyForecast">
                    <!-- Daily items will be added here -->
                </div>
            </section>
        </main>

        <!-- Footer -->
        <footer class="footer">
            <p>Weather data by <a href="https://openweathermap.org/" target="_blank">OpenWeatherMap</a></p>
        </footer>
    </div>

    <script src="script.js"></script>
</body>
</html>
